<!doctype html>
<html lang="en">
  <head>

    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap CSS via CDN -->

    <title>Hello, world! (Bootstrap Demo)</title>
  </head>
  <body>
    <!-- A Bootstrap container for proper layout and alignment -->
    <div class="container">
      <h1 class="mt-5">Hello, world!</h1>
      <p>This is my first web page using Bootstrap.</p>
      <button class="btn btn-primary">Click Me</button>
    </div>

    <!-- Bootstrap JS via CDN (optional, but needed for interactive components like dropdowns, modals, etc.) -->
